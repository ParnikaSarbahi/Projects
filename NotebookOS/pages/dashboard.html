<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>NotebookOS</title>
  <link rel="stylesheet" href="../styles/main.css"/>
  <link rel="stylesheet" href="../styles/dashboard.css"/>
</head>
<body>
<div id="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="logo">
        <span class="logo-mark">📓</span>
        <span class="logo-name">NotebookOS</span>
      </div>
      <button class="new-nb-btn" id="btn-new-notebook" title="New notebook">+</button>
    </div>

    <nav class="sidebar-nav" id="sidebar-nav">
      <button class="nav-item active" data-view="all">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.3"/><rect x="8" y="1" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.3"/><rect x="1" y="8" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.3"/><rect x="8" y="8" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.3"/></svg>
        All Notebooks
      </button>
      <button class="nav-item" data-view="recent">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.3"/><path d="M7 4v3.5l2 1.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        Recent
      </button>
      <div class="nav-divider"></div>
      <!-- Notebook shortcuts injected here -->
      <div id="nb-shortcuts"></div>
    </nav>

    <div class="sidebar-bottom">
      <div id="storage-bar"></div>
      <button class="sidebar-action" id="btn-export">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1v8M3.5 6l3 3 3-3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><path d="M1 10h11" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        Export backup
      </button>
      <button class="sidebar-action" id="btn-import">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 9V1M3.5 4l3-3 3 3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><path d="M1 10h11" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        Import backup
      </button>
      <button class="sidebar-action" id="btn-repair">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 11l3.5-3.5M7 2l4 4-1.5 1.5L5.5 3.5 7 2z" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Repair storage
      </button>
      <button class="sidebar-action" id="btn-settings">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="6.5" cy="6.5" r="2" stroke="currentColor" stroke-width="1.3"/><path d="M6.5 1v1.2M6.5 10.8V12M1 6.5h1.2M10.8 6.5H12M2.7 2.7l.85.85M9.45 9.45l.85.85M2.7 10.3l.85-.85M9.45 3.55l.85-.85" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        Settings
      </button>
      <button class="sidebar-action" id="btn-dark">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M10.5 7.5A4.5 4.5 0 015 2a5.5 5.5 0 100 9 4.5 4.5 0 01-1.5-3.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        Toggle dark mode
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- Topbar -->
    <div class="topbar">
      <div class="topbar-left">
        <h1 class="view-title" id="view-title">All Notebooks</h1>
        <span class="view-sub" id="view-sub"></span>
      </div>
      <div class="topbar-right">
        <div class="search-wrap">
          <svg class="search-icon" width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.3"/><path d="M9.5 9.5l3 3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          <input class="search-input" id="search-input" placeholder="Search…" autocomplete="off"/>
        </div>
        <div class="view-toggle" id="view-toggle">
          <button class="vt-btn active" data-layout="grid" title="Grid">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.3"/><rect x="8" y="1" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.3"/><rect x="1" y="8" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.3"/><rect x="8" y="8" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.3"/></svg>
          </button>
          <button class="vt-btn" data-layout="list" title="List">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><line x1="1" y1="3.5" x2="13" y2="3.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><line x1="1" y1="7" x2="13" y2="7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><line x1="1" y1="10.5" x2="13" y2="10.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          </button>
        </div>
        <select class="sort-select" id="sort-select">
          <option value="updated">Last edited</option>
          <option value="created">Created</option>
          <option value="name">Name A–Z</option>
          <option value="pages">Most pages</option>
        </select>
      </div>
    </div>

    <!-- Views -->
    <div class="view-body" id="view-all">
      <div id="notebooks-grid" class="nb-grid"></div>
    </div>

    <div class="view-body hidden" id="view-recent">
      <div id="recent-list" class="page-list"></div>
    </div>

    <div class="view-body hidden" id="view-detail">
      <div class="detail-head" id="detail-head"></div>
      <div id="detail-list" class="page-list" style="margin-top:20px;"></div>
    </div>

  </main>
</div>

<!-- MODALS -->
<div class="modal-bg hidden" id="modal-bg">
  <!-- New / Edit Notebook -->
  <div class="modal" id="modal-nb" style="display:none">
    <div class="modal-head">
      <h2 id="modal-nb-title">New Notebook</h2>
      <button class="modal-close" id="btn-modal-close">✕</button>
    </div>
    <label class="field-label">Name</label>
    <input class="input" id="modal-nb-name" placeholder="e.g. Operating Systems" maxlength="40" autocomplete="off"/>
    <label class="field-label" style="margin-top:16px">Color</label>
    <div class="color-row" id="modal-colors">
      <button class="clr active" data-c="#BFD7EA" style="background:#BFD7EA"></button>
      <button class="clr" data-c="#C8E6C9" style="background:#C8E6C9"></button>
      <button class="clr" data-c="#FFE0B2" style="background:#FFE0B2"></button>
      <button class="clr" data-c="#FADADD" style="background:#FADADD"></button>
      <button class="clr" data-c="#E1D5E7" style="background:#E1D5E7"></button>
      <button class="clr" data-c="#D4E6D4" style="background:#D4E6D4"></button>
      <button class="clr" data-c="#F5F5DC" style="background:#F5F5DC"></button>
      <button class="clr" data-c="#CFD8DC" style="background:#CFD8DC"></button>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" id="btn-modal-cancel">Cancel</button>
      <button class="btn btn-primary" id="btn-modal-save">Create</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>
<input type="file" id="file-import" accept=".json" style="display:none"/>

<script src="../scripts/storage.js"></script>
<script src="../scripts/dashboard.js"></script>

<!-- LOCK SCREEN -->
<div id="lock-screen" class="lock-screen hidden">
  <div class="lock-card">
    <div class="lock-icon">🔒</div>
    <h2 class="lock-title">NotebookOS</h2>
    <p class="lock-sub">Enter your password to unlock the dashboard.</p>
    <input type="password" id="lock-input" class="input" placeholder="Password" autocomplete="current-password"/>
    <button class="btn btn-primary w-full" id="btn-unlock" style="margin-top:10px;justify-content:center">Unlock</button>
    <div id="lock-error" style="font-size:0.78rem;color:#e05;margin-top:8px;text-align:center;min-height:18px"></div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="modal-bg hidden" id="settings-bg">
  <div class="modal" style="width:360px">
    <div class="modal-head">
      <h2>Settings</h2>
      <button class="modal-close" id="btn-settings-close">✕</button>
    </div>

    <div class="settings-row">
      <div>
        <div class="settings-label">Password lock</div>
        <div class="settings-hint">Require a password to open the dashboard.</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="toggle-lock"/>
        <span class="toggle-track"></span>
      </label>
    </div>

    <div id="password-section" class="hidden" style="margin-top:14px">
      <label class="field-label">Set password</label>
      <input type="password" class="input" id="new-password" placeholder="New password" autocomplete="new-password"/>
      <label class="field-label" style="margin-top:10px">Confirm password</label>
      <input type="password" class="input" id="confirm-password" placeholder="Confirm password" autocomplete="new-password"/>
      <button class="btn btn-primary btn-sm" id="btn-save-password" style="margin-top:12px">Save password</button>
      <button class="btn btn-ghost btn-sm" id="btn-remove-password" style="margin-top:6px;color:#e05">Remove password</button>
    </div>

    <div class="settings-row" style="margin-top:14px">
      <div>
        <div class="settings-label">Floating overlay</div>
        <div class="settings-hint">Show a note widget on every webpage.</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="toggle-overlay"/>
        <span class="toggle-track"></span>
      </label>
    </div>

    <div class="modal-foot" style="margin-top:20px">
      <button class="btn btn-ghost" id="btn-settings-cancel">Close</button>
    </div>
  </div>
</div>

</body>
</html>
