<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NotebookOS</title>
  <link rel="stylesheet" href="../styles/main.css" />
  <link rel="stylesheet" href="../styles/sidepanel.css" />
</head>
<body>
<div id="app">

  <!-- ══════════════════════════════════════════════
       SCREEN 1: Loading
  ══════════════════════════════════════════════ -->
  <div id="state-loading" class="state-screen">
    <div class="loading-dots"><span></span><span></span><span></span></div>
  </div>

  <!-- ══════════════════════════════════════════════
       SCREEN 2: New URL — ask user to start notes
  ══════════════════════════════════════════════ -->
  <div id="state-new-url" class="state-screen hidden">
    <div class="welcome-card">
      <div class="welcome-icon">📖</div>
      <h2>Start taking notes?</h2>
      <div id="current-url-display" class="url-chip"></div>
      <p class="text-secondary text-sm">No notes exist for this page yet.</p>
      <div class="welcome-actions">
        <button class="btn btn-primary" id="btn-start-notes">✏️  Start Notes</button>
        <button class="btn btn-ghost" id="btn-dismiss">Not now</button>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════
       SCREEN 3: Choose / Create Notebook
  ══════════════════════════════════════════════ -->
  <div id="state-choose-notebook" class="state-screen hidden">
    <div class="notebook-chooser">
      <button class="btn btn-ghost btn-sm" id="btn-back-to-welcome">← Back</button>
      <h2 style="margin-top:12px;">Choose a Notebook</h2>
      <p class="text-sm text-muted" style="margin:6px 0 16px;">Which subject does this page belong to?</p>

      <div id="notebook-list" class="notebook-list"></div>

      <div class="divider"></div>

      <div id="create-notebook-form" class="create-form hidden">
        <input type="text" class="input" id="new-notebook-name"
          placeholder="e.g. Operating Systems" maxlength="40" />
        <div class="flex gap-2 items-center" style="margin-top:10px;">
          <div class="color-picker" id="color-picker">
            <button class="color-dot active" data-color="#BFD7EA" style="background:#BFD7EA"></button>
            <button class="color-dot" data-color="#C8E6C9" style="background:#C8E6C9"></button>
            <button class="color-dot" data-color="#FFE0B2" style="background:#FFE0B2"></button>
            <button class="color-dot" data-color="#FADADD" style="background:#FADADD"></button>
            <button class="color-dot" data-color="#E1D5E7" style="background:#E1D5E7"></button>
            <button class="color-dot" data-color="#D4E6D4" style="background:#D4E6D4"></button>
          </div>
          <button class="btn btn-primary btn-sm" id="btn-create-notebook" style="margin-left:auto;">Create</button>
        </div>
      </div>

      <button class="btn btn-soft btn-sm w-full" id="btn-show-create-form">+ New Notebook</button>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════
       SCREEN 4: Main Editor
  ══════════════════════════════════════════════ -->
  <div id="state-editor" class="state-screen hidden">

    <!-- Top bar: notebook tag + actions -->
    <header class="editor-header">
      <div class="notebook-tag" id="editor-notebook-tag">
        <span class="nb-color-dot" id="editor-nb-color"></span>
        <span id="editor-nb-name" class="truncate"></span>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="btn-open-dashboard" title="Dashboard (⊞)">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
            <rect x="1" y="1" width="5.5" height="5.5" rx="1" stroke="currentColor" stroke-width="1.2"/>
            <rect x="8.5" y="1" width="5.5" height="5.5" rx="1" stroke="currentColor" stroke-width="1.2"/>
            <rect x="1" y="8.5" width="5.5" height="5.5" rx="1" stroke="currentColor" stroke-width="1.2"/>
            <rect x="8.5" y="8.5" width="5.5" height="5.5" rx="1" stroke="currentColor" stroke-width="1.2"/>
          </svg>
        </button>
        <button class="icon-btn" id="btn-toggle-dark" title="Toggle dark mode">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
            <path d="M7.5 1v2M7.5 12v2M1 7.5h2M12 7.5h2M3.2 3.2l1.4 1.4M10.4 10.4l1.4 1.4M3.2 11.8l1.4-1.4M10.4 4.6l1.4-1.4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            <circle cx="7.5" cy="7.5" r="2.5" stroke="currentColor" stroke-width="1.3"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Page title — large Notion-style heading -->
    <div class="page-title-wrapper">
      <input type="text" id="page-title-input" class="page-title-input"
        placeholder="Untitled Page" maxlength="120" autocomplete="off" spellcheck="true" />
    </div>

    <!-- Rich text toolbar -->
    <div class="editor-toolbar" id="editor-toolbar">
      <!-- Text style -->
      <button class="tool-btn" data-cmd="bold"      title="Bold (Ctrl+B)"><b>B</b></button>
      <button class="tool-btn" data-cmd="italic"    title="Italic (Ctrl+I)"><i>I</i></button>
      <button class="tool-btn" data-cmd="underline" title="Underline (Ctrl+U)"><u>U</u></button>
      <button class="tool-btn" data-cmd="strikeThrough" title="Strikethrough"><s>S</s></button>

      <div class="toolbar-sep"></div>

      <!-- Block formatting -->
      <button class="tool-btn" data-cmd="h1"    title="Heading 1">H1</button>
      <button class="tool-btn" data-cmd="h2"    title="Heading 2">H2</button>
      <button class="tool-btn" data-cmd="h3"    title="Heading 3">H3</button>
      <button class="tool-btn" data-cmd="quote" title="Blockquote">"</button>

      <div class="toolbar-sep"></div>

      <!-- Lists -->
      <button class="tool-btn" data-cmd="insertUnorderedList" title="Bullet list">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <circle cx="2" cy="3.5" r="1.2" fill="currentColor"/>
          <line x1="5" y1="3.5" x2="13" y2="3.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          <circle cx="2" cy="7" r="1.2" fill="currentColor"/>
          <line x1="5" y1="7" x2="13" y2="7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          <circle cx="2" cy="10.5" r="1.2" fill="currentColor"/>
          <line x1="5" y1="10.5" x2="11" y2="10.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </button>
      <button class="tool-btn" data-cmd="insertOrderedList" title="Numbered list">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <text x="0" y="5" font-size="5" fill="currentColor" font-family="monospace">1.</text>
          <line x1="5" y1="3.5" x2="13" y2="3.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          <text x="0" y="9" font-size="5" fill="currentColor" font-family="monospace">2.</text>
          <line x1="5" y1="7" x2="13" y2="7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          <text x="0" y="13" font-size="5" fill="currentColor" font-family="monospace">3.</text>
          <line x1="5" y1="10.5" x2="11" y2="10.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </button>

      <div class="toolbar-sep"></div>

      <!-- Code & link -->
      <button class="tool-btn" data-cmd="code"       title="Inline code (Ctrl+`)">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M4 4L1 7l3 3M10 4l3 3-3 3M8 2l-2 10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="tool-btn" data-cmd="codeblock"  title="Code block">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <rect x="1" y="2.5" width="12" height="9" rx="1.5" stroke="currentColor" stroke-width="1.2"/>
          <line x1="1" y1="5.5" x2="13" y2="5.5" stroke="currentColor" stroke-width="1"/>
          <circle cx="3" cy="4" r="0.7" fill="currentColor"/>
          <circle cx="5.2" cy="4" r="0.7" fill="currentColor"/>
        </svg>
      </button>
      <button class="tool-btn" data-cmd="createLink" title="Insert link (Ctrl+K)">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M5.5 8.5a3.5 3.5 0 005 0l2-2a3.5 3.5 0 00-5-5L6.5 2.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          <path d="M8.5 5.5a3.5 3.5 0 00-5 0l-2 2a3.5 3.5 0 005 5l1-1" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
      </button>

      <div class="toolbar-sep"></div>

      <!-- Highlight -->
      <button class="tool-btn" data-cmd="hiliteColor" data-value="#FFF176" title="Highlight">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <rect x="1" y="9" width="12" height="2.5" rx="1" fill="#FFF176" stroke="currentColor" stroke-width="0.8"/>
          <path d="M3.5 8.5L7 2l3.5 6.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="4.5" y1="6.5" x2="9.5" y2="6.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <!-- Slash command menu (hidden by default) -->
    <div id="slash-menu" class="slash-menu hidden">
      <div class="slash-menu-label">Insert block</div>
      <button class="slash-item" data-cmd="h1">
        <span class="slash-icon">H1</span>
        <span class="slash-text">Heading 1</span>
        <span class="slash-hint">Large section heading</span>
      </button>
      <button class="slash-item" data-cmd="h2">
        <span class="slash-icon">H2</span>
        <span class="slash-text">Heading 2</span>
        <span class="slash-hint">Medium section heading</span>
      </button>
      <button class="slash-item" data-cmd="h3">
        <span class="slash-icon">H3</span>
        <span class="slash-text">Heading 3</span>
        <span class="slash-hint">Small section heading</span>
      </button>
      <button class="slash-item" data-cmd="insertUnorderedList">
        <span class="slash-icon">•</span>
        <span class="slash-text">Bullet List</span>
        <span class="slash-hint">Unordered list</span>
      </button>
      <button class="slash-item" data-cmd="insertOrderedList">
        <span class="slash-icon">1.</span>
        <span class="slash-text">Numbered List</span>
        <span class="slash-hint">Ordered list</span>
      </button>
      <button class="slash-item" data-cmd="quote">
        <span class="slash-icon">"</span>
        <span class="slash-text">Blockquote</span>
        <span class="slash-hint">Callout or quote</span>
      </button>
      <button class="slash-item" data-cmd="codeblock">
        <span class="slash-icon">&lt;/&gt;</span>
        <span class="slash-text">Code Block</span>
        <span class="slash-hint">Monospace code area</span>
      </button>
      <button class="slash-item" data-cmd="hr">
        <span class="slash-icon">—</span>
        <span class="slash-text">Divider</span>
        <span class="slash-hint">Horizontal rule</span>
      </button>
    </div>

    <!-- The contenteditable editor -->
    <div id="editor" class="editor-body"
      contenteditable="true"
      data-placeholder="Start writing… or type / for commands"
      spellcheck="true"
      autocorrect="on"
    ></div>

    <!-- Floating selection toolbar (appears on text select) -->
    <div id="selection-toolbar" class="selection-toolbar hidden">
      <button class="sel-btn" data-cmd="bold"      title="Bold"><b>B</b></button>
      <button class="sel-btn" data-cmd="italic"    title="Italic"><i>I</i></button>
      <button class="sel-btn" data-cmd="underline" title="Underline"><u>U</u></button>
      <div class="sel-sep"></div>
      <button class="sel-btn" data-cmd="hiliteColor" data-value="#FFF176" title="Highlight">★</button>
      <button class="sel-btn" data-cmd="createLink" title="Link">🔗</button>
    </div>

    <!-- Status bar -->
    <footer class="editor-footer">
      <span id="word-count" class="footer-stat">0 words</span>
      <span id="char-count" class="footer-stat"></span>
      <span id="save-status" class="footer-stat save-status">—</span>
    </footer>

  </div><!-- /#state-editor -->

  <!-- ══════════════════════════════════════════════
       SCREEN 5: Empty (restricted URL / new tab)
  ══════════════════════════════════════════════ -->
  <div id="state-empty" class="state-screen hidden">
    <div class="empty-state">
      <div class="empty-icon">📓</div>
      <p class="empty-title">Open a webpage to take notes</p>
      <p class="text-sm text-muted">NotebookOS links your notes to every page you visit.</p>
      <button id="btn-goto-dashboard" class="btn btn-soft btn-sm" style="margin-top:16px;">
        View Dashboard
      </button>
    </div>
  </div>

</div><!-- /#app -->

<!-- Toast (injected by JS, declared here for clarity) -->
<div id="toast" class="toast"></div>

<script src="../scripts/storage.js"></script>
<script src="../scripts/sidepanel.js"></script>
</body>
</html>
